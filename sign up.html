<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #FFE5EC;
            --bg-card: #FFC2D1;
            --btn-primary: #FF8FAB;
            --accent: #FB6F92;
            --text-main: #1F1F1F;
        }

        body {
            background: var(--bg-main);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        form {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            border-color: var(--btn-primary);
        }

        input[type="button"] {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: var(--btn-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        input[type="button"]:hover {
            background: var(--accent);
        }
    </style>
</head>

<body>

    <form id="studentForm">
        <h2>Join the Community</h2>

        <label>Name</label>
        <input type="text" id="userName" required>

        <br><br>

        <label>Email</label>
        <input type="email" id="userEmail" required>

        <input type="button" value="Register Now" onclick="handleSignup()">
    </form>

</body>
</html>
